<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter 1 Project — Professional Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Geist', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── Section labels ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.65rem 1rem;
      background: #fafafa;
      border-bottom: 1.5px solid #e0e0e0;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
    }

    .section-label span {
      font-size: 1rem;
    }

    /* ── iframes ── */
    .frame-block {
      width: 100%;
      border-bottom: 2px solid #e0e0e0;
    }

    .frame-block:last-child {
      border-bottom: none;
    }

    iframe {
      width: 100%;
      border: none;
      display: block;
    }

    #project-frame { height: 80vh; }
    #rubric-frame  { height: 80vh; }
  </style>
</head>
<body>

  <h1 class="sr-only">Chapter 1 Project — Professional Learning. Two sections stacked vertically: Student Project on top, Rubric below.</h1>

  <!-- Student project -->
  <div class="frame-block">
    <div class="section-label" aria-hidden="true">
      <span>🌐</span> Student Project
    </div>
    <iframe
      id="project-frame"
      src="project/index.html"
      title="Student project website"
      scrolling="yes">
    </iframe>
  </div>

  <!-- Rubric -->
  <div class="frame-block">
    <div class="section-label" aria-hidden="true">
      <span>📋</span> Rubric
    </div>
    <iframe
      id="rubric-frame"
      src="rubric.html"
      title="Chapter 1 Project Rubric — interactive scoring table"
      scrolling="yes">
    </iframe>
  </div>

</body>
</html>
